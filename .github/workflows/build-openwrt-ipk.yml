name: build-openwrt-ipk

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison gawk             gettext libncurses-dev libssl-dev python3 python3-distutils             unzip zstd file wget rsync

      - name: Download OpenWrt SDK
        run: |
          wget -q https://downloads.openwrt.org/releases/24.10.5/targets/mediatek/filogic/openwrt-sdk-24.10.5-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          tar --zstd -xf openwrt-sdk-*.tar.zst
          mv openwrt-sdk-* sdk

      - name: Prepare feeds
        working-directory: sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add fptn package
        run: |
          mkdir -p sdk/package/fptn
          cp -r openwrt/* sdk/package/fptn/

      - name: Build ipk
        working-directory: sdk
        run: |
          make defconfig
          make package/fptn/compile V=s

      - name: Collect ipk
        run: |
          mkdir out
          find sdk/bin/packages -name "*.ipk" -exec cp {} out/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fptn-ipk
          path: out/*.ipk
