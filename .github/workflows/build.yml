name: build-openwrt-ipk

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with OpenWrt SDK (24.10.0, mediatek/filogic)
        uses: openwrt/gh-action-sdk@v7
        with:
          sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/mediatek/filogic/openwrt-sdk-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          package: fptn
          make_flags: V=s
          pre_build: |
            set -eux
            FILE=/builder/feeds/packages/net/curl/Config.in
            test -f "$FILE"
            # Break the Kconfig recursion: LIBCURL_LDAP <-> PACKAGE_libcurl
            # Patch ONLY inside the LIBCURL_LDAP config block.
            sed -i '/^config LIBCURL_LDAP$/,/^config /{s/\tdepends on PACKAGE_libcurl/\tdepends on BROKEN/}' "$FILE"
            # Print the patched block for debugging
            awk 'BEGIN{p=0} /^config LIBCURL_LDAP$/{p=1} p{print} /^config / && NR>1 && p && $2!="LIBCURL_LDAP"{exit}' "$FILE" || true

      - uses: actions/upload-artifact@v4
        with:
          name: fptn-ipk
          path: bin/packages/**/fptn_*.ipk
