name: Build OpenWrt ipk

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      OPENWRT_RELEASE: "24.10.5"
      OPENWRT_TARGET: "mediatek/filogic"
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git curl ca-certificates \
            tar gzip xz-utils zstd

      - name: Download OpenWrt SDK (robust)
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="https://downloads.openwrt.org/releases/${OPENWRT_RELEASE}/targets/${OPENWRT_TARGET}/"
          echo "BASE_URL=$BASE_URL"

          # Discover SDK archive name (OpenWrt occasionally changes gcc version / archive extension)
          SDK_FILE=$(curl -fsSL "$BASE_URL" \
            | tr '"' '\n' \
            | grep -E '^openwrt-sdk-.*-Linux-x86_64\.tar\.(xz|zst)$' \
            | head -n 1 || true)

          if [ -z "${SDK_FILE}" ]; then
            echo "ERROR: Could not discover SDK archive at $BASE_URL" >&2
            echo "Page content (first 80 lines):" >&2
            curl -fsSL "$BASE_URL" | sed -n '1,80p' >&2 || true
            exit 1
          fi

          echo "SDK_FILE=$SDK_FILE"
          curl -fL "${BASE_URL}${SDK_FILE}" -o sdk.tar

          mkdir -p sdk
          if echo "$SDK_FILE" | grep -q '\.tar\.zst$'; then
            tar --use-compress-program=unzstd -xf sdk.tar
          else
            tar -xf sdk.tar
          fi

          mv openwrt-sdk-* sdk
          echo "SDK unpacked to: $(ls -1 sdk | head -n 1)"

      - name: Prepare package
        shell: bash
        run: |
          set -euo pipefail
          # Expecting this repo to already contain an OpenWrt package directory layout.
          # If you keep package files in a subdir (e.g. openwrt/), adjust the copy path below.
          mkdir -p sdk/package/fptn
          rsync -a --exclude 'sdk' ./ sdk/package/fptn/

      - name: Build ipk
        shell: bash
        run: |
          set -euo pipefail
          cd sdk
          make defconfig
          make package/fptn/compile V=s

      - name: Collect artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fptn-ipk
          path: sdk/bin/packages/**/*.ipk
