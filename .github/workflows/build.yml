name: build-ipk

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-distutils rsync unzip zlib1g-dev file wget

      - name: Download OpenWrt SDK
        run: |
          set -eux
          SDK_URL="https://downloads.openwrt.org/releases/24.10.0/targets/mediatek/filogic/openwrt-sdk-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget -O sdk.tar.zst "$SDK_URL"
          tar --use-compress-program=unzstd -xf sdk.tar.zst
          mv openwrt-sdk-* openwrt-sdk

      - name: Add package to SDK
        run: |
          cp -r package/fptn openwrt-sdk/package/

      - name: Build package
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/fptn/{clean,compile} V=s -j$(nproc)

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find openwrt-sdk/bin/packages -name "*fptn*.ipk" -exec cp {} artifacts/ \;

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: fptn-ipk
          path: artifacts/*.ipk
