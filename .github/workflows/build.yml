name: Build fptn-client-cli (.apk) for OpenWrt 25.x (ubuntu + OpenWrt toolchain)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout packaging repo files
        uses: actions/checkout@v4
        with:
          path: pkg

      - name: Checkout fptn sources
        uses: actions/checkout@v4
        with:
          repository: batchar2/fptn
          fetch-depth: 0
          path: fptn

      - name: Install build deps
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y             python3 python3-pip git ca-certificates             cmake ninja-build make             tar gzip xz-utils zstd curl binutils coreutils

      - name: Install Conan
        run: |
          set -eux
          pip3 install conan
          conan profile detect --force

      - name: Download OpenWrt toolchain (mediatek/filogic, aarch64_cortex-a53)
        run: |
          set -eux
          TOOLCHAIN_URL="https://downloads.openwrt.org/releases/24.10.0/targets/mediatek/filogic/openwrt-toolchain-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          mkdir -p toolchain
          curl -L "$TOOLCHAIN_URL" -o toolchain/toolchain.tar.zst
          tar --use-compress-program=unzstd -xf toolchain/toolchain.tar.zst -C toolchain

      - name: Create Conan host profile (OpenWrt/musl/arm64, absolute compiler paths)
        run: |
          set -eux
          CC_BIN_REL="$(find toolchain -type f -name 'aarch64-openwrt-linux-musl-gcc.bin' -print -quit)"
          CXX_BIN_REL="$(find toolchain -type f -name 'aarch64-openwrt-linux-musl-g++.bin' -print -quit)"
          test -n "$CC_BIN_REL"
          test -n "$CXX_BIN_REL"

          CC_BIN="$(readlink -f "$CC_BIN_REL")"
          CXX_BIN="$(readlink -f "$CXX_BIN_REL")"

          GCC_VER_FULL="$($CC_BIN -dumpfullversion -dumpversion)"
          GCC_VER_MAJOR="${GCC_VER_FULL%%.*}"

          mkdir -p ~/.conan2/profiles
          cat > ~/.conan2/profiles/openwrt-a53 <<EOF
          [settings]
          os=Linux
          arch=armv8
          compiler=gcc
          compiler.version=${GCC_VER_MAJOR}
          compiler.libcxx=libstdc++11
          compiler.cppstd=20
          build_type=Release

          [conf]
          tools.build:compiler_executables={'c':'${CC_BIN}','cpp':'${CXX_BIN}'}
          tools.build:skip_test=True
          EOF

      - name: Build (Conan + CMake)
        run: |
          set -eux
          cd fptn

          conan install .             -pr:h=openwrt-a53             -pr:b=default             -o with_gui_client=False             -o build_only_fptn_lib=False             --build=missing

          cmake -B build -G Ninja             -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake             -DCMAKE_BUILD_TYPE=Release

          cmake --build build
          test -f build/src/fptn-client/fptn-client-cli

      - name: Pack .apk (for OpenWrt apk)
        run: |
          set -eux
          PKGNAME="fptn-client-cli"
          PKGVER="0.3.34-r1"
          ARCH="aarch64_cortex-a53"

          ROOT="$PWD/apkroot"
          mkdir -p "$ROOT"/usr/bin "$ROOT"/etc/init.d "$ROOT"/etc/fptn-client

          cp fptn/build/src/fptn-client/fptn-client-cli "$ROOT/usr/bin/"
          chmod +x "$ROOT/usr/bin/fptn-client-cli"

          cp pkg/files/fptn-client.init "$ROOT/etc/init.d/fptn-client"
          chmod +x "$ROOT/etc/init.d/fptn-client"

          cp pkg/files/client.conf "$ROOT/etc/fptn-client/client.conf"

          (cd "$ROOT" && tar -czf ../data.tar.gz .)

          cat > .PKGINFO <<EOF
          pkgname = ${PKGNAME}
          pkgver = ${PKGVER}
          arch = ${ARCH}
          origin = ${PKGNAME}
          maintainer = you
          license = MIT
          pkgdesc = FPTN client CLI for OpenWrt (AX3000T)
          url = https://github.com/batchar2/fptn
          depend = libstdcpp
          EOF

          OUT="${PKGNAME}-${PKGVER}.${ARCH}.apk"
          tar -czf "${OUT}" .PKGINFO data.tar.gz

          ls -la "${OUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fptn-client-cli_ax3000t_apk
          path: "*.apk"
