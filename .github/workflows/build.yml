name: build-openwrt-ipk

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (Ubuntu 24.04)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends             build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev             libssl-dev python3 python3-venv python3-pip python-is-python3             rsync unzip zlib1g-dev file wget ca-certificates xz-utils zstd

      - name: Download OpenWrt SDK (24.10.0, mediatek/filogic)
        run: |
          set -eux
          SDK_URL="https://downloads.openwrt.org/releases/24.10.0/targets/mediatek/filogic/openwrt-sdk-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget -qO sdk.tar.zst "$SDK_URL"
          tar --zstd -xf sdk.tar.zst
          SDK_DIR="$(ls -d openwrt-sdk-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64)"
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV

      - name: Prepare SDK (feeds + curl LDAP loop fix)
        run: |
          set -eux
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Copy OpenWrt package from this repo into SDK
          rm -rf package/fptn
          cp -a "$GITHUB_WORKSPACE/package/fptn" package/fptn

          # Fix Kconfig recursion: LIBCURL_LDAP <-> PACKAGE_libcurl
          FILE="feeds/packages/net/curl/Config.in"
          test -f "$FILE"
          sed -i '/^config LIBCURL_LDAP$/,/^config / s/^[[:space:]]*depends on PACKAGE_libcurl.*/\tdepends on BROKEN/' "$FILE"

          make defconfig

      - name: Build only fptn package
        run: |
          set -eux
          cd "$SDK_DIR"
          make package/fptn/{clean,compile} V=s -j"$(nproc)"
          echo "=== Built IPK files (all) ==="
          find bin -type f -name "*.ipk" -print || true
          echo "=== Built IPK files (fptn) ==="
          find bin -type f -name "*fptn*.ipk" -print || true

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: fptn-ipk
          path: |
            **/bin/packages/**/*.ipk
            **/bin/targets/**/*.ipk
          if-no-files-found: error
