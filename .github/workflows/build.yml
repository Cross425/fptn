name: Build fptn-client-cli (.ipk) for AX3000T (ubuntu + OpenWrt toolchain)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout packaging repo files
        uses: actions/checkout@v4
        with:
          path: pkg

      - name: Checkout fptn sources
        uses: actions/checkout@v4
        with:
          repository: batchar2/fptn
          fetch-depth: 0
          path: fptn

      - name: Install build deps
        shell: bash
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y             python3 python3-pip git ca-certificates             cmake ninja-build make             tar gzip xz-utils zstd curl

      - name: Install Conan
        shell: bash
        run: |
          set -eux
          pip3 install conan
          conan profile detect --force

      - name: Download OpenWrt toolchain (mediatek/filogic, aarch64_cortex-a53)
        shell: bash
        run: |
          set -eux
          # Toolchain for OpenWrt 24.10.0 mediatek/filogic (AX3000T)
          TOOLCHAIN_URL="https://downloads.openwrt.org/releases/24.10.0/targets/mediatek/filogic/openwrt-toolchain-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          mkdir -p toolchain
          curl -L "$TOOLCHAIN_URL" -o toolchain/toolchain.tar.zst
          tar --use-compress-program=unzstd -xf toolchain/toolchain.tar.zst -C toolchain
          echo "Extracted toolchain:"
          ls -la toolchain | sed -n '1,80p'

          # Find gcc/g++ in extracted toolchain
          TOOLCHAIN_DIR="$(find toolchain -maxdepth 2 -type d -name 'staging_dir' -print -quit | xargs -I{} dirname {} )"
          echo "TOOLCHAIN_DIR=$TOOLCHAIN_DIR"
          BIN_DIR="$(find "$TOOLCHAIN_DIR" -type d -path '*staging_dir/toolchain-*/*/bin' -o -path '*staging_dir/toolchain-*/bin' -print -quit || true)"
          if [ -z "${BIN_DIR}" ]; then
            BIN_DIR="$(find "$TOOLCHAIN_DIR" -type d -path '*staging_dir/toolchain-*/bin' -print -quit)"
          fi
          echo "BIN_DIR=$BIN_DIR"
          echo "$BIN_DIR" >> $GITHUB_PATH

          echo "Toolchain gcc:"
          ls -la "$BIN_DIR" | grep -E 'openwrt-linux.*-g\+\+|openwrt-linux.*-gcc' | head -n 20 || true

      - name: Create Conan host profile (OpenWrt/musl/arm64)
        shell: bash
        run: |
          set -eux
          # locate compilers after PATH update
          CC_BIN="$(command -v aarch64-openwrt-linux-musl-gcc || command -v *openwrt-linux*-gcc)"
          CXX_BIN="$(command -v aarch64-openwrt-linux-musl-g++ || command -v *openwrt-linux*-g++)"

          echo "CC_BIN=$CC_BIN"
          echo "CXX_BIN=$CXX_BIN"

          GCC_VER_FULL="$(${CC_BIN} -dumpfullversion -dumpversion)"
          GCC_VER_MAJOR="${GCC_VER_FULL%%.*}"
          echo "GCC_VER_FULL=$GCC_VER_FULL"
          echo "GCC_VER_MAJOR=$GCC_VER_MAJOR"

          mkdir -p ~/.conan2/profiles
          cat > ~/.conan2/profiles/openwrt-a53 <<EOF
          [settings]
          os=Linux
          arch=armv8
          compiler=gcc
          compiler.version=${GCC_VER_MAJOR}
          compiler.libcxx=libstdc++11
          compiler.cppstd=20
          build_type=Release

          [conf]
          tools.build:compiler_executables={'c':'${CC_BIN}','cpp':'${CXX_BIN}'}
          EOF

          echo "=== Conan profile openwrt-a53 ==="
          cat ~/.conan2/profiles/openwrt-a53

      - name: Build (Conan + CMake)
        shell: bash
        run: |
          set -eux
          cd fptn

          # Skip tests when cross-building deps (recipes may try to run target binaries)
          conan install .             -pr:h=openwrt-a53             -pr:b=default             -o with_gui_client=False             -o build_only_fptn_lib=False             -c tools.build:skip_test=True             --build=missing

          cmake -B build -G Ninja -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake
          cmake --build build

          test -f build/src/fptn-client/fptn-client-cli

      - name: Pack .ipk
        shell: bash
        run: |
          set -eux
          PKGDIR="$PWD/ipkroot"
          mkdir -p "$PKGDIR"/{CONTROL,usr/bin,etc/init.d,etc/fptn-client}

          cp fptn/build/src/fptn-client/fptn-client-cli "$PKGDIR/usr/bin/"
          chmod +x "$PKGDIR/usr/bin/fptn-client-cli"

          cp pkg/files/fptn-client.init "$PKGDIR/etc/init.d/fptn-client"
          chmod +x "$PKGDIR/etc/init.d/fptn-client"

          cp pkg/files/client.conf "$PKGDIR/etc/fptn-client/client.conf"

          cat > "$PKGDIR/CONTROL/control" <<'EOF'
          Package: fptn-client-cli
          Version: 0.3.34-1
          Architecture: aarch64_cortex-a53
          Maintainer: you
          Section: net
          Priority: optional
          Depends: libc, libstdcpp, ip-full, iptables, kmod-tun
          Description: FPTN client CLI for OpenWrt (AX3000T)
          EOF

          # Use OpenWrt's opkg-build by fetching it from toolchain SDK? Here we use a tiny pure-tar ipk builder.
          # Create .ipk manually (ipk = ar archive with debian-binary, control.tar.gz, data.tar.gz)
          echo "2.0" > debian-binary

          (cd "$PKGDIR/CONTROL" && tar -czf ../../control.tar.gz .)
          (cd "$PKGDIR" && tar -czf ../data.tar.gz --exclude=CONTROL .)

          ar r fptn-client-cli_0.3.34-1_aarch64_cortex-a53.ipk debian-binary control.tar.gz data.tar.gz
          ls -la *.ipk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fptn-client-cli_ax3000t_ipk
          path: "*.ipk"
