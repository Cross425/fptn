name: build-openwrt-ipk

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends             build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev             libssl-dev python3 python3-distutils python3-setuptools rsync unzip zlib1g-dev file             wget ca-certificates xz-utils zstd

      - name: Download OpenWrt SDK (24.10.0, mediatek/filogic)
        run: |
          set -eux
          SDK_URL="https://downloads.openwrt.org/releases/24.10.0/targets/mediatek/filogic/openwrt-sdk-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget -qO sdk.tar.zst "$SDK_URL"
          tar --zstd -xf sdk.tar.zst
          SDK_DIR="$(ls -d openwrt-sdk-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64)"
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV

      - name: Prepare SDK and patch curl LDAP loop
        run: |
          set -eux
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Copy package from repo into SDK
          if [ -d "$GITHUB_WORKSPACE/package/fptn" ]; then
            rm -rf package/fptn
            cp -a "$GITHUB_WORKSPACE/package/fptn" package/fptn
          else
            echo "ERROR: $GITHUB_WORKSPACE/package/fptn not found in repo"
            exit 1
          fi

          # Fix Kconfig recursion: LIBCURL_LDAP <-> PACKAGE_libcurl
          FILE="feeds/packages/net/curl/Config.in"
          test -f "$FILE"
          sed -i '/^config LIBCURL_LDAP$/,/^config / s/^[[:space:]]*depends on PACKAGE_libcurl.*/\tdepends on BROKEN/' "$FILE"
          grep -n "^config LIBCURL_LDAP$" -A6 "$FILE" | sed -n '1,20p'

          make defconfig

      - name: Build only fptn package
        run: |
          set -eux
          cd "$SDK_DIR"
          make package/fptn/{clean,compile} V=s -j"$(nproc)"

      - uses: actions/upload-artifact@v4
        with:
          name: fptn-ipk
          path: |
            openwrt-sdk-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64/bin/packages/**/fptn*.ipk
