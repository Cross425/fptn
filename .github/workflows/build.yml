name: Build OpenWrt ipk

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential git wget tar gzip xz-utils

      - name: Download OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/24.10.5/targets/mediatek/filogic/openwrt-sdk-24.10.5-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk

      - name: Prepare package
        run: |
          mkdir -p sdk/package/fptn
          cp -r * sdk/package/fptn || true

      - name: Build ipk
        run: |
          cd sdk
          make defconfig
          make package/fptn/compile V=s

      - name: Collect artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fptn-ipk
          path: sdk/bin/packages/**/*.ipk
