name: Build fptn-client-cli (.ipk) for OpenWrt 24.10 (AX3000T)

on:
  push:
  workflow_dispatch:

env:
  OWRT_VERSION: "24.10.5"
  OWRT_TARGET_PATH: "targets/mediatek/filogic"
  OWRT_ARCH: "aarch64_cortex-a53"
  PKG_NAME: "fptn-client-cli"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout packaging repo files
        uses: actions/checkout@v4
        with:
          path: pkg

      - name: Checkout fptn sources
        uses: actions/checkout@v4
        with:
          repository: batchar2/fptn
          fetch-depth: 0
          path: fptn

      - name: Install build deps
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip git ca-certificates \
            cmake ninja-build make \
            tar gzip xz-utils zstd curl binutils coreutils \
            file

      # Conan v1.x is more predictable for older recipes/toolchains
      - name: Install Conan 1.59
        run: |
          set -eux
          pip3 install "conan==1.59.0"
          conan profile new default --detect --force

      - name: Download OpenWrt SDK + toolchain (auto-discovery, .tar.zst)
        run: |
          set -euo pipefail
          BASE="https://downloads.openwrt.org/releases/${OWRT_VERSION}/${OWRT_TARGET_PATH}/"

          mkdir -p openwrt

          echo "Fetching index: $BASE"
          INDEX_HTML="$(curl -fsSL "$BASE")"

          SDK_FILE="$(printf '%s' "$INDEX_HTML" | grep -oE 'openwrt-sdk-[^\" ]+Linux-x86_64\.tar\.zst' | head -n1 || true)"
          TC_FILE="$(printf '%s' "$INDEX_HTML" | grep -oE 'openwrt-toolchain-[^\" ]+Linux-x86_64\.tar\.zst' | head -n1 || true)"

          if [ -z "$SDK_FILE" ]; then
            echo "ERROR: Could not find SDK archive in index. First 200 chars:" >&2
            printf '%s' "$INDEX_HTML" | head -c 200 >&2 || true
            exit 1
          fi

          if [ -z "$TC_FILE" ]; then
            echo "ERROR: Could not find toolchain archive in index." >&2
            exit 1
          fi

          SDK_URL="$BASE$SDK_FILE"
          TC_URL="$BASE$TC_FILE"

          echo "SDK_URL=$SDK_URL"
          echo "TOOLCHAIN_URL=$TC_URL"

          curl -L "$SDK_URL" -o openwrt/sdk.tar.zst
          curl -L "$TC_URL" -o openwrt/toolchain.tar.zst

          tar --use-compress-program=unzstd -xf openwrt/sdk.tar.zst -C openwrt
          tar --use-compress-program=unzstd -xf openwrt/toolchain.tar.zst -C openwrt

          SDK_DIR="$(find openwrt -maxdepth 1 -type d -name 'openwrt-sdk-*' -print -quit)"
          TC_DIR="$(find openwrt -maxdepth 1 -type d -name 'openwrt-toolchain-*' -print -quit)"

          test -n "$SDK_DIR"
          test -n "$TC_DIR"

          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          echo "TC_DIR=$TC_DIR" >> $GITHUB_ENV

      - name: Create Conan host profile (OpenWrt/musl/arm64, absolute compiler paths)
        run: |
          set -eux

          # Prefer compilers from the downloaded toolchain archive
          CC_BIN_REL="$(find "$TC_DIR" -type f -name 'aarch64-openwrt-linux-musl-gcc' -print -quit)"
          CXX_BIN_REL="$(find "$TC_DIR" -type f -name 'aarch64-openwrt-linux-musl-g++' -print -quit)"

          # Some archives ship *.bin wrappers
          if [ -z "$CC_BIN_REL" ]; then
            CC_BIN_REL="$(find "$TC_DIR" -type f -name 'aarch64-openwrt-linux-musl-gcc.bin' -print -quit)"
          fi
          if [ -z "$CXX_BIN_REL" ]; then
            CXX_BIN_REL="$(find "$TC_DIR" -type f -name 'aarch64-openwrt-linux-musl-g++.bin' -print -quit)"
          fi

          test -n "$CC_BIN_REL"
          test -n "$CXX_BIN_REL"

          CC_BIN="$(readlink -f "$CC_BIN_REL")"
          CXX_BIN="$(readlink -f "$CXX_BIN_REL")"

          GCC_VER_FULL="$($CC_BIN -dumpfullversion -dumpversion)"
          GCC_VER_MAJOR="${GCC_VER_FULL%%.*}"

          mkdir -p ~/.conan/profiles
          cat > ~/.conan/profiles/openwrt-a53 <<EOF
          [settings]
          os=Linux
          arch=armv8
          compiler=gcc
          compiler.version=${GCC_VER_MAJOR}
          compiler.libcxx=libstdc++11
          compiler.cppstd=20
          build_type=Release

          [env]
          CC=${CC_BIN}
          CXX=${CXX_BIN}

          [conf]
          tools.build:compiler_executables={'c':'${CC_BIN}','cpp':'${CXX_BIN}'}
          tools.build:skip_test=True
          EOF

      - name: Build (Conan + CMake)
        run: |
          set -eux
          cd fptn

          conan install . \
            -pr:h=openwrt-a53 \
            -pr:b=default \
            -o with_gui_client=False \
            -o build_only_fptn_lib=False \
            --build=missing

          cmake -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release

          cmake --build build

          test -f build/src/fptn-client/fptn-client-cli

      - name: Pack .ipk using OpenWrt opkg-build (from SDK)
        run: |
          set -eux

          # Put SDK host tools on PATH (opkg-build, etc.)
          export PATH="$SDK_DIR/staging_dir/host/bin:$PATH"
          command -v opkg-build

          PKGROOT="$PWD/ipkroot"
          OUTDIR="$PWD/artifacts"
          rm -rf "$PKGROOT" "$OUTDIR"
          mkdir -p "$PKGROOT"/CONTROL "$PKGROOT"/usr/bin "$PKGROOT"/etc/init.d "$PKGROOT"/etc/fptn-client "$OUTDIR"

          cp fptn/build/src/fptn-client/fptn-client-cli "$PKGROOT/usr/bin/"
          chmod +x "$PKGROOT/usr/bin/fptn-client-cli"

          # These files must exist in your packaging repo (pkg/files/..)
          cp pkg/files/fptn-client.init "$PKGROOT/etc/init.d/fptn-client"
          chmod +x "$PKGROOT/etc/init.d/fptn-client"

          cp pkg/files/client.conf "$PKGROOT/etc/fptn-client/client.conf"

          cat > "$PKGROOT/CONTROL/control" <<EOF
          Package: ${PKG_NAME}
          Version: 0.3.34-1
          Architecture: ${OWRT_ARCH}
          Maintainer: you
          Section: net
          Priority: optional
          Depends: libc, libstdcpp, ip-full, iptables, kmod-tun
          Description: FPTN client CLI for OpenWrt (mediatek/filogic)
          EOF

          # Build ipk (forces correct tar/ar format for current opkg)
          opkg-build -o root -g root "$PKGROOT" "$OUTDIR"

          ls -la "$OUTDIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fptn-client-cli_ipk_${{ env.OWRT_ARCH }}
          path: artifacts/*.ipk
