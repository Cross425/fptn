name: Build fptn-client-cli (.apk) via OpenWrt SDK (Conan 1.59 toolchain fix)
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FETCHCONTENT_FULLY_DISCONNECTED: ON
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build python3 python3-pip git xz-utils zstd curl rsync pkg-config ca-certificates
          python3 -m pip install --upgrade pip
          python3 -m pip install conan==1.59.0
          conan profile new default --detect --force
      - name: Download OpenWrt SDK
        run: |
          set -eux
          SDK_URL="https://downloads.openwrt.org/releases/25.12.0-rc2/targets/mediatek/filogic/openwrt-sdk-25.12.0-rc2-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          mkdir -p sdk
          curl -L "$SDK_URL" -o sdk/sdk.tar.zst
          tar --use-compress-program=unzstd -xf sdk/sdk.tar.zst -C sdk
          echo "SDK_DIR=$(find sdk -maxdepth 1 -type d -name 'openwrt-sdk-*' -print -quit)" >> $GITHUB_ENV
      - name: Feeds
        run: |
          set -eux
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      - name: Add local package
        run: |
          set -eux
          cd "$SDK_DIR"
          mkdir -p package/fptn-client-cli
          rsync -a "$GITHUB_WORKSPACE/openwrt/package/fptn-client-cli/" package/fptn-client-cli/
      - name: Conan host profile (openwrt-a53)
        run: |
          set -eux
          TOOLBIN="$SDK_DIR/staging_dir/toolchain-aarch64_cortex-a53_gcc-14.3.0_musl/bin"
          CC="$TOOLBIN/aarch64-openwrt-linux-musl-gcc"
          CXX="$TOOLBIN/aarch64-openwrt-linux-musl-g++"
          mkdir -p "$HOME/.conan/profiles"
          cat > "$HOME/.conan/profiles/openwrt-a53" <<EOF
          [settings]
          os=Linux
          arch=armv8
          compiler=gcc
          compiler.version=14
          compiler.libcxx=libstdc++11
          build_type=Release
          [env]
          CC=$CC
          CXX=$CXX
          EOF
      - name: Build
        run: |
          set -eux
          cd "$SDK_DIR"
          make defconfig
          make package/fptn-client-cli/compile V=s -j$(nproc)
      - name: Collect
        run: |
          set -eux
          mkdir -p artifacts
          find "$SDK_DIR/bin/packages" -name '*.apk' -exec cp {} artifacts/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: fptn-client-cli-apk
          path: artifacts/*
