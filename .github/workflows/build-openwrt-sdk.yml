name: Build fptn-client-cli (.apk) via OpenWrt SDK (Conan 1.59)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build python3 python3-pip git \
            xz-utils zstd curl rsync pkg-config ca-certificates file
          python3 -m pip install -U pip
          python3 -m pip install "conan==1.59.0"
          conan --version
          # Ensure default build profile exists for Conan 1.x
          conan profile new default --detect --force

      - name: Download OpenWrt SDK (25.12.0-rc2, mediatek/filogic)
        run: |
          set -eux
          SDK_URL="https://downloads.openwrt.org/releases/25.12.0-rc2/targets/mediatek/filogic/openwrt-sdk-25.12.0-rc2-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          mkdir -p sdk
          curl -L "$SDK_URL" -o sdk/sdk.tar.zst
          tar --use-compress-program=unzstd -xf sdk/sdk.tar.zst -C sdk
          SDK_DIR="$(find sdk -maxdepth 1 -type d -name 'openwrt-sdk-*' -print -quit)"
          test -n "$SDK_DIR"
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          echo "Using SDK_DIR=$SDK_DIR"

      - name: Feeds
        run: |
          set -eux
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add local package
        run: |
          set -eux
          cd "$SDK_DIR"
          mkdir -p package/fptn-client-cli
          rsync -a "${GITHUB_WORKSPACE}/openwrt/package/fptn-client-cli/" package/fptn-client-cli/

      - name: Create Conan host profile (openwrt-a53) for SDK toolchain
        run: |
          set -eux
          TOOLBIN="$SDK_DIR/staging_dir/toolchain-aarch64_cortex-a53_gcc-14.3.0_musl/bin"
          test -d "$TOOLBIN"

          CC="$TOOLBIN/aarch64-openwrt-linux-musl-gcc"
          CXX="$TOOLBIN/aarch64-openwrt-linux-musl-g++"
          AR="$TOOLBIN/aarch64-openwrt-linux-musl-ar"
          RANLIB="$TOOLBIN/aarch64-openwrt-linux-musl-ranlib"
          STRIP="$TOOLBIN/aarch64-openwrt-linux-musl-strip"

          # Some SDKs ship *.bin wrappers; fall back if needed
          for p in CC CXX AR RANLIB STRIP; do
            v="${!p}"
            if [ ! -x "$v" ] && [ -x "${v}.bin" ]; then
              eval "$p='${v}.bin'"
            fi
            test -x "${!p}"
          done

          mkdir -p "$HOME/.conan/profiles"
          cat > "$HOME/.conan/profiles/openwrt-a53" <<EOF
          [settings]
          os=Linux
          arch=armv8
          compiler=gcc
          compiler.version=14
          compiler.libcxx=libstdc++11
          build_type=Release

          [env]
          CC=$CC
          CXX=$CXX
          AR=$AR
          RANLIB=$RANLIB
          STRIP=$STRIP
          EOF

          echo "=== Conan openwrt-a53 profile ==="
          cat "$HOME/.conan/profiles/openwrt-a53"

      - name: Build package (.apk)
        run: |
          set -eux
          cd "$SDK_DIR"
          make defconfig
          make package/fptn-client-cli/compile V=s -j"$(nproc)"
          make package/fptn-client-cli/install V=s

      - name: Collect artifacts
        run: |
          set -eux
          cd "$SDK_DIR"
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          find bin/packages -type f \( -name '*.apk' -o -name '*.ipk' \) -maxdepth 6 -print -exec cp -v {} "${GITHUB_WORKSPACE}/artifacts/" \;
          ls -la "${GITHUB_WORKSPACE}/artifacts"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fptn-client-cli-packages
          path: artifacts/*
