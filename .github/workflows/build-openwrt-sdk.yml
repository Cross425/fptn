name: Build fptn-client-cli (.apk) via OpenWrt SDK (mediatek/filogic aarch64_cortex-a53)

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-openwrt-sdk.yml"
      - "openwrt/**"
      - "src/**"
      - "CMakeLists.txt"
      - "conanfile.py"
      - ".gitmodules"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build python3 python3-pip git \
            xz-utils zstd curl file rsync pkg-config ca-certificates
          python3 -m pip install -U pip

      - name: Install Conan (v2)
        run: |
          python3 -m pip install "conan>=2.0,<3.0"
          conan --version

      - name: Download OpenWrt SDK (25.12.0-rc2, mediatek/filogic)
        run: |
          set -eux
          SDK_URL="https://downloads.openwrt.org/releases/25.12.0-rc2/targets/mediatek/filogic/openwrt-sdk-25.12.0-rc2-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          mkdir -p sdk
          curl -L "$SDK_URL" -o sdk/sdk.tar.zst
          tar --use-compress-program=unzstd -xf sdk/sdk.tar.zst -C sdk
          SDK_DIR="$(find sdk -maxdepth 1 -type d -name 'openwrt-sdk-*' -print -quit)"
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          echo "Extracted SDK_DIR=$SDK_DIR"

      - name: Prepare feeds
        run: |
          set -eux
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add local package (fptn-client-cli)
        run: |
          set -eux
          cd "$SDK_DIR"
          mkdir -p package/fptn-client-cli
          rsync -a "${GITHUB_WORKSPACE}/openwrt/package/fptn-client-cli/" "package/fptn-client-cli/"

      - name: Conan profile for OpenWrt toolchain (Conan v2)
        run: |
          set -eux
          cd "$SDK_DIR"
          TOOLBIN="$PWD/staging_dir/toolchain-aarch64_cortex-a53_gcc-14.3.0_musl/bin"
          test -d "$TOOLBIN"

          mkdir -p "$HOME/.conan2/profiles"
          cat > "$HOME/.conan2/profiles/openwrt-a53" <<'EOF'
          [settings]
          os=Linux
          arch=armv8
          compiler=gcc
          compiler.version=14
          compiler.libcxx=libstdc++11
          build_type=Release

          [conf]
          tools.build:compiler_executables={"c":"__CC__","cpp":"__CXX__"}
          tools.gnu:ar="__AR__"
          tools.gnu:ranlib="__RANLIB__"
          tools.gnu:strip="__STRIP__"
          tools.cmake.cmaketoolchain:generator=Ninja

          [buildenv]
          CC=__CC__
          CXX=__CXX__
          AR=__AR__
          RANLIB=__RANLIB__
          STRIP=__STRIP__
          EOF

          CC="$TOOLBIN/aarch64-openwrt-linux-musl-gcc"
          CXX="$TOOLBIN/aarch64-openwrt-linux-musl-g++"
          AR="$TOOLBIN/aarch64-openwrt-linux-musl-ar"
          RANLIB="$TOOLBIN/aarch64-openwrt-linux-musl-ranlib"
          STRIP="$TOOLBIN/aarch64-openwrt-linux-musl-strip"

          for t in CC CXX AR RANLIB STRIP; do
            p="${!t}"
            if [ ! -x "$p" ] && [ -x "${p}.bin" ]; then
              eval "$t='${p}.bin'"
            fi
            test -x "${!t}"
          done

          sed -i \
            -e "s|__CC__|$CC|g" \
            -e "s|__CXX__|$CXX|g" \
            -e "s|__AR__|$AR|g" \
            -e "s|__RANLIB__|$RANLIB|g" \
            -e "s|__STRIP__|$STRIP|g" \
            "$HOME/.conan2/profiles/openwrt-a53"

          echo "Conan profile:"
          cat "$HOME/.conan2/profiles/openwrt-a53"

      - name: Build package (.apk)
        run: |
          set -eux
          cd "$SDK_DIR"
          make defconfig
          make package/fptn-client-cli/compile V=s -j"$(nproc)"
          make package/fptn-client-cli/install V=s

      - name: Collect artifacts
        run: |
          set -eux
          cd "$SDK_DIR"
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          find bin/packages -type f \( -name '*.apk' -o -name '*.ipk' \) -maxdepth 6 -print -exec cp -v {} "${GITHUB_WORKSPACE}/artifacts/" \;
          ls -la "${GITHUB_WORKSPACE}/artifacts"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fptn-client-cli-packages
          path: artifacts/*
