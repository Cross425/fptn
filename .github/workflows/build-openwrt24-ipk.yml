name: build-openwrt24-ipk
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-distutils rsync unzip zlib1g-dev file wget

      - name: Download OpenWrt SDK
        run: |
          set -eux
          SDK_URL="https://downloads.openwrt.org/releases/24.10.5/targets/mediatek/filogic/openwrt-sdk-24.10.5-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.xz"
          wget -O sdk.tar.xz "$SDK_URL"
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk

      - name: Prepare SDK
        run: |
          set -eux
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add fptn package
        run: |
          set -eux
          cd sdk
          mkdir -p package/fptn
          cp -r $GITHUB_WORKSPACE/* package/fptn/

      - name: Build ipk
        run: |
          set -eux
          cd sdk
          make defconfig
          make package/fptn/compile V=s

      - name: Collect artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk
          path: sdk/bin/packages/**/fptn*.ipk
